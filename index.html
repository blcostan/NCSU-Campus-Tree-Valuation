<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NCSU Tree Appraisal Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .sticky-val { position: sticky; top: 0; z-index: 5000; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-bottom: 4px solid #CC0000; padding: 1rem; }
        #results { position: absolute; top: 100%; left: 0; right: 0; background: #18181b; border: 2px solid #CC0000; z-index: 9999; max-height: 200px; overflow-y: auto; display: none; border-radius: 0 0 12px 12px; }
        .search-item { padding: 14px; border-bottom: 1px solid #27272a; cursor: pointer; font-style: italic; font-size: 14px; }
        input[type=range] { @apply w-full accent-[#CC0000] h-3 bg-zinc-800 rounded-lg appearance-none cursor-pointer mt-4; }
        
        /* Fixed Matrix Layout */
        .matrix-row { @apply border-b border-zinc-800 py-4 last:border-0 flex items-start gap-4; }
        .matrix-pct { @apply text-[#CC0000] font-black text-xs w-20 flex-shrink-0 pt-0.5; }
        .matrix-desc { @apply text-[12px] text-zinc-400 leading-snug flex-grow; }
        
        .guide-card { @apply bg-zinc-900/50 p-6 border-t-2 border-zinc-700 rounded-xl mb-6 h-auto; }
        .guide-title { @apply text-white font-bold text-sm mb-4 flex items-center uppercase tracking-wider; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="min-h-screen">

    <div class="sticky-val no-print">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-[9px] font-black text-[#CC0000] uppercase tracking-tighter">Campus Asset Value</p>
                <h1 id="valDisplay" class="text-3xl md:text-5xl font-black leading-none tracking-tight">$0.00</h1>
            </div>
            <button onclick="window.print()" class="bg-white text-black text-[10px] font-black px-4 py-2 rounded uppercase shadow-lg">Export PDF</button>
        </div>
    </div>

    <main class="max-w-4xl mx-auto p-4 flex flex-col gap-8 no-print">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 shadow-xl">
                <h2 class="text-[#CC0000] font-black text-[10px] uppercase tracking-widest mb-4 italic">1. Identity & Size</h2>
                <div class="relative">
                    <input type="text" id="sSearch" autocomplete="off" placeholder="Search Latin Name..." 
                           class="w-full bg-black border-2 border-zinc-700 p-4 rounded-xl italic focus:border-[#CC0000] outline-none text-white text-lg">
                    <div id="results"></div>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div class="bg-black p-4 rounded-xl border border-zinc-800 text-center">
                        <span class="block text-[9px] text-zinc-500 font-bold uppercase mb-1">Species %</span>
                        <input type="number" id="sRate" value="90" oninput="calc()" class="w-full bg-transparent text-2xl font-black text-[#CC0000] outline-none text-center">
                    </div>
                    <div class="bg-black p-4 rounded-xl border border-zinc-800 text-center">
                        <span class="block text-[9px] text-zinc-500 font-bold uppercase mb-1">DBH (In)</span>
                        <input type="number" id="dbh" value="24" oninput="calc()" class="w-full bg-transparent text-2xl font-black text-white outline-none text-center">
                    </div>
                </div>
            </div>

            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 space-y-6">
                <h2 class="text-[#CC0000] font-black text-[10px] uppercase tracking-widest italic">2. Depreciation Factors</h2>
                <div>
                    <div class="flex justify-between text-[11px] font-bold uppercase">Condition Rating <span id="cLab" class="text-[#CC0000]">85%</span></div>
                    <input type="range" id="cond" min="1" max="100" value="85" oninput="calc()">
                </div>
                <div>
                    <div class="flex justify-between text-[11px] font-bold uppercase">Functional Suitability <span id="fLab" class="text-[#CC0000]">100%</span></div>
                    <input type="range" id="func" min="1" max="100" value="100" oninput="calc()">
                </div>
                <div>
                    <div class="flex justify-between text-[11px] font-bold uppercase">Master Plan Alignment <span id="eLab" class="text-[#CC0000]">100%</span></div>
                    <input type="range" id="ext" min="1" max="100" value="100" oninput="calc()">
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <h2 class="text-zinc-600 font-black text-[10px] uppercase tracking-[.3em] mb-4 ml-1 italic text-center">Field Assessment Standards</h2>
            
            <div class="guide-card">
